name: Bug report
description: Report a defect in code, examples, or automation.
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: input
    id: area
    attributes:
      label: Affected area
      description: Name the file, command, endpoint, or workflow involved.
      placeholder: src/..., bin/post.php, CI workflow
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction details
      description: Include commands, logs, URLs, or screenshots when relevant.
